<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Apollo Task Explorer</title>
  <script src="task-explorer-data.js"></script>
  <style>
    :root {
      --ink: #20211f;
      --muted: #666b63;
      --paper: #f7f4ee;
      --surface: #ffffff;
      --line: #d8d1c4;
      --line-strong: #b6aa98;
      --green: #246b5b;
      --green-soft: #dcebe4;
      --gold: #a76f1a;
      --gold-soft: #f4e2bf;
      --red: #9d3d2f;
      --blue: #315f8d;
      --shadow: 0 18px 60px rgba(59, 47, 29, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(36, 107, 91, 0.07) 1px, transparent 1px),
        linear-gradient(rgba(36, 107, 91, 0.05) 1px, transparent 1px),
        var(--paper);
      background-size: 28px 28px;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      letter-spacing: 0;
      overflow-x: hidden;
    }

    button,
    input,
    select {
      font: inherit;
      letter-spacing: 0;
    }

    .page {
      min-height: 100vh;
    }

    .masthead {
      border-bottom: 1px solid var(--line);
      background: rgba(247, 244, 238, 0.9);
      backdrop-filter: blur(14px);
    }

    .masthead-inner {
      width: min(1500px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 22px;
      display: grid;
      grid-template-columns: minmax(260px, 1.2fr) minmax(360px, 2fr);
      gap: 24px;
      align-items: end;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 34px;
      line-height: 1.05;
      font-weight: 700;
    }

    .dek {
      margin: 10px 0 0;
      max-width: 640px;
      color: var(--muted);
      line-height: 1.45;
      font-size: 14px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(92px, 1fr));
      gap: 8px;
    }

    .summary-tile {
      min-height: 78px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.68);
    }

    .summary-tile strong {
      display: block;
      font-size: 22px;
      line-height: 1;
      font-weight: 750;
    }

    .summary-tile span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
    }

    .workspace {
      width: min(1500px, calc(100% - 32px));
      margin: 18px auto 28px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      gap: 16px;
      align-items: start;
      min-width: 0;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: var(--shadow);
      overflow: hidden;
      min-width: 0;
    }

    .controls {
      padding: 14px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      border-bottom: 1px solid var(--line);
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(7, minmax(104px, 1fr));
      gap: 7px;
    }

    .tab {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: #fbfaf7;
      cursor: pointer;
      text-align: left;
      padding: 8px 10px;
      transition: border-color 0.16s ease, background 0.16s ease, transform 0.16s ease;
    }

    .tab:hover {
      border-color: var(--line-strong);
      transform: translateY(-1px);
    }

    .tab.active {
      background: var(--ink);
      color: white;
      border-color: var(--ink);
    }

    .tab span {
      display: block;
      font-size: 11px;
      color: currentColor;
      opacity: 0.72;
      margin-top: 3px;
    }

    .filters {
      display: grid;
      grid-template-columns: minmax(220px, 1.5fr) minmax(180px, 0.9fr) minmax(140px, 0.65fr) minmax(180px, 0.8fr);
      gap: 8px;
    }

    .field {
      min-width: 0;
    }

    .field label {
      display: block;
      margin: 0 0 5px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 650;
    }

    .field input,
    .field select {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      padding: 0 11px;
      outline: none;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(36, 107, 91, 0.14);
    }

    .data-summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(130px, 1fr));
      gap: 8px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #fbfaf7;
    }

    .metric-chip {
      border-left: 3px solid var(--green);
      padding: 2px 0 2px 10px;
    }

    .metric-chip strong {
      display: block;
      font-size: 20px;
      line-height: 1.1;
    }

    .metric-chip span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
    }

    .note {
      display: none;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--gold-soft);
      color: #5f3e09;
      font-size: 12px;
      line-height: 1.35;
    }

    .note.visible {
      display: block;
    }

    .table-wrap {
      overflow: auto;
      max-height: calc(100vh - 315px);
      min-height: 440px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1120px;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #eee8dc;
      color: #4b4a45;
      border-bottom: 1px solid var(--line-strong);
      font-size: 11px;
      text-transform: uppercase;
      text-align: left;
      padding: 11px 10px;
      white-space: nowrap;
    }

    tbody td {
      border-bottom: 1px solid #ebe6dc;
      padding: 11px 10px;
      vertical-align: top;
      font-size: 13px;
      line-height: 1.3;
    }

    tbody tr {
      cursor: pointer;
      transition: background 0.12s ease;
    }

    tbody tr:hover,
    tbody tr.selected {
      background: #f5f0e6;
    }

    .task-name {
      max-width: 340px;
      font-weight: 720;
      line-height: 1.25;
    }

    .subtle {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 500;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 3px 7px;
      border-radius: 999px;
      background: var(--green-soft);
      color: var(--green);
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }

    .pill.gold {
      background: var(--gold-soft);
      color: var(--gold);
    }

    .perf {
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .delta {
      font-weight: 760;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .delta.good {
      color: var(--green);
    }

    .delta.bad {
      color: var(--red);
    }

    .bar-cell {
      min-width: 120px;
    }

    .bar {
      width: 100%;
      height: 8px;
      margin-top: 7px;
      border-radius: 999px;
      background: #eadfd1;
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--green), var(--blue));
    }

    .empty {
      padding: 44px 18px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .details {
      position: sticky;
      top: 16px;
      max-height: calc(100vh - 32px);
      overflow: auto;
    }

    .details-head {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: #fbfaf7;
    }

    .details-head h2 {
      margin: 9px 0 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 24px;
      line-height: 1.12;
    }

    .details-body {
      padding: 14px 16px 16px;
    }

    .kv {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      gap: 9px 12px;
      margin-bottom: 16px;
      font-size: 13px;
      line-height: 1.35;
    }

    .kv dt {
      color: var(--muted);
      font-weight: 650;
    }

    .kv dd {
      margin: 0;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .details-table {
      min-width: 0;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      display: table;
    }

    .details-table th,
    .details-table td {
      border-bottom: 1px solid #ebe6dc;
      padding: 9px;
      font-size: 12px;
      text-align: left;
      vertical-align: top;
    }

    .details-table th {
      background: #eee8dc;
      color: #4b4a45;
      text-transform: none;
    }

    .details-table tr:last-child td {
      border-bottom: 0;
    }

    .export-row {
      display: flex;
      justify-content: flex-end;
      padding: 0 14px 12px;
    }

    .ghost-button {
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfaf7;
      color: var(--ink);
      padding: 0 12px;
      cursor: pointer;
    }

    .ghost-button:hover {
      border-color: var(--line-strong);
    }

    @media (max-width: 1180px) {
      .masthead-inner,
      .workspace {
        grid-template-columns: 1fr;
      }

      .details {
        position: static;
        max-height: none;
      }
    }

    @media (max-width: 820px) {
      .masthead-inner,
      .workspace {
        width: calc(100% - 20px);
        max-width: 1500px;
      }

      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        width: 100%;
      }

      .tabs {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .filters,
      .data-summary {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 28px;
      }

      .table-wrap {
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="masthead">
      <div class="masthead-inner">
        <div>
          <h1>Apollo Task Explorer</h1>
          <p class="dek">A static browser interface for the manuscript task tables, showing task definitions and baseline versus Apollo performance.</p>
        </div>
        <div class="summary-grid" id="summaryGrid"></div>
      </div>
    </header>

    <main class="workspace">
      <section class="panel">
        <div class="controls">
          <div class="tabs" id="tabs"></div>
          <div class="filters">
            <div class="field">
              <label for="searchInput">Search</label>
              <input id="searchInput" type="search" placeholder="Disease, task, endpoint, category">
            </div>
            <div class="field">
              <label for="categorySelect">Category</label>
              <select id="categorySelect"></select>
            </div>
            <div class="field">
              <label for="metricSelect">Metric</label>
              <select id="metricSelect">
                <option value="auc">AUC</option>
                <option value="balancedAccuracy">Balanced accuracy</option>
                <option value="cIndex">C-index</option>
                <option value="brierScore">Brier score</option>
                <option value="ici">ICI</option>
                <option value="mce">MCE</option>
              </select>
            </div>
            <div class="field">
              <label for="sortSelect">Sort</label>
              <select id="sortSelect">
                <option value="deltaDesc">Largest Apollo gain</option>
                <option value="apolloDesc">Highest Apollo score</option>
                <option value="baselineDesc">Highest baseline score</option>
                <option value="incidenceDesc">Highest incidence</option>
                <option value="nDesc">Largest cohort</option>
                <option value="taskAsc">Task name</option>
              </select>
            </div>
          </div>
        </div>

        <div class="data-summary" id="dataSummary"></div>
        <div class="note" id="benchmarkNote"></div>
        <div class="export-row">
          <button class="ghost-button" id="exportButton" type="button">Export CSV</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Task / Disease</th>
                <th>Category</th>
                <th>Duration</th>
                <th>N</th>
                <th>Incidence</th>
                <th>Baseline</th>
                <th>Apollo</th>
                <th>Delta</th>
              </tr>
            </thead>
            <tbody id="taskRows"></tbody>
          </table>
          <div class="empty" id="emptyState" hidden>No matching tasks.</div>
        </div>
      </section>

      <aside class="panel details" id="detailsPane"></aside>
    </main>
  </div>

  <script>
    const DATA = window.APOLLO_TASK_DATA;
    const TASKS = DATA.tasks.map((task, index) => ({ ...task, id: index }));

    const GROUPS = [
      { key: "all", label: "All", count: TASKS.length },
      { key: "new_onset", label: "New onset", count: DATA.totals.new_onset },
      { key: "disease_progression", label: "Progression", count: DATA.totals.disease_progression },
      { key: "treatment_response", label: "Treatment", count: DATA.totals.treatment_response },
      { key: "adverse_events", label: "Adverse events", count: DATA.totals.adverse_events },
      { key: "hospital_operations", label: "Operations", count: DATA.totals.hospital_operations },
      { key: "cancer_benchmark", label: "Cancer benchmark", count: DATA.cancerBenchmarkCount },
    ];

    const METRICS = {
      auc: { label: "AUC", higherIsBetter: true },
      balancedAccuracy: { label: "Balanced accuracy", higherIsBetter: true },
      cIndex: { label: "C-index", higherIsBetter: true },
      brierScore: { label: "Brier score", higherIsBetter: false },
      ici: { label: "ICI", higherIsBetter: false },
      mce: { label: "MCE", higherIsBetter: false },
    };

    const state = {
      group: "all",
      search: "",
      category: "all",
      metric: "auc",
      sort: "deltaDesc",
      selectedId: 0,
    };

    const summaryGrid = document.querySelector("#summaryGrid");
    const tabs = document.querySelector("#tabs");
    const searchInput = document.querySelector("#searchInput");
    const categorySelect = document.querySelector("#categorySelect");
    const metricSelect = document.querySelector("#metricSelect");
    const sortSelect = document.querySelector("#sortSelect");
    const taskRows = document.querySelector("#taskRows");
    const emptyState = document.querySelector("#emptyState");
    const detailsPane = document.querySelector("#detailsPane");
    const dataSummary = document.querySelector("#dataSummary");
    const benchmarkNote = document.querySelector("#benchmarkNote");
    const exportButton = document.querySelector("#exportButton");

    function metricValue(task, model, metricKey) {
      return task.models?.[model]?.[metricKey]?.value ?? null;
    }

    function metricDisplay(task, model, metricKey) {
      return task.models?.[model]?.[metricKey]?.display ?? "NA";
    }

    function deltaValue(task, metricKey) {
      const baseline = metricValue(task, "Age-Sex", metricKey);
      const apollo = metricValue(task, "Apollo", metricKey);
      if (baseline == null || apollo == null) return null;
      return Number((apollo - baseline).toFixed(3));
    }

    function isGoodDelta(delta, metricKey) {
      if (delta == null) return false;
      return METRICS[metricKey].higherIsBetter ? delta >= 0 : delta <= 0;
    }

    function improvementValue(task, metricKey) {
      const delta = deltaValue(task, metricKey);
      if (delta == null) return null;
      return METRICS[metricKey].higherIsBetter ? delta : -delta;
    }

    function formatDelta(delta) {
      if (delta == null) return "NA";
      return `${delta > 0 ? "+" : ""}${delta.toFixed(3)}`;
    }

    function formatNumber(value) {
      if (value == null) return "NA";
      return Number(value).toLocaleString("en-US");
    }

    function mean(values) {
      const clean = values.filter((value) => value != null && Number.isFinite(value));
      if (!clean.length) return null;
      return clean.reduce((sum, value) => sum + value, 0) / clean.length;
    }

    function scoreWidth(value) {
      if (value == null) return 0;
      return Math.max(0, Math.min(100, value * 100));
    }

    function taskSearchText(task) {
      return [
        task.group,
        task.category,
        task.task,
        task.duration,
        task.n,
        task.incidence,
        task.snapshotEvent,
        task.endpointEvent,
        task.sex,
      ].join(" ").toLowerCase();
    }

    function baseFilteredTasks() {
      return TASKS.filter((task) => {
        if (state.group === "cancer_benchmark" && !task.isCancerBenchmark) return false;
        if (state.group !== "all" && state.group !== "cancer_benchmark" && task.groupKey !== state.group) return false;
        return true;
      });
    }

    function filteredTasks() {
      const query = state.search.trim().toLowerCase();
      return baseFilteredTasks()
        .filter((task) => state.category === "all" || task.category === state.category)
        .filter((task) => !query || taskSearchText(task).includes(query))
        .sort((a, b) => {
          const metricKey = state.metric;
          const aGain = improvementValue(a, metricKey);
          const bGain = improvementValue(b, metricKey);
          const aApollo = metricValue(a, "Apollo", metricKey);
          const bApollo = metricValue(b, "Apollo", metricKey);
          const aBaseline = metricValue(a, "Age-Sex", metricKey);
          const bBaseline = metricValue(b, "Age-Sex", metricKey);

          if (state.sort === "deltaDesc") return (bGain ?? -Infinity) - (aGain ?? -Infinity);
          if (state.sort === "apolloDesc") return (bApollo ?? -Infinity) - (aApollo ?? -Infinity);
          if (state.sort === "baselineDesc") return (bBaseline ?? -Infinity) - (aBaseline ?? -Infinity);
          if (state.sort === "incidenceDesc") return (b.incidenceValue ?? -Infinity) - (a.incidenceValue ?? -Infinity);
          if (state.sort === "nDesc") return (b.nValue ?? -Infinity) - (a.nValue ?? -Infinity);
          return a.task.localeCompare(b.task);
        });
    }

    function renderSummaryTiles() {
      const tiles = [
        ["261", "prognostic tasks"],
        [DATA.totals.new_onset, "new onset"],
        [DATA.totals.disease_progression, "progression"],
        [DATA.totals.treatment_response, "treatment response"],
        [DATA.totals.adverse_events, "adverse events"],
        [DATA.totals.hospital_operations, "operations"],
      ];

      summaryGrid.innerHTML = tiles
        .map(([value, label]) => `<div class="summary-tile"><strong>${value}</strong><span>${label}</span></div>`)
        .join("");
    }

    function renderTabs() {
      tabs.innerHTML = GROUPS.map((group) => `
        <button class="tab ${state.group === group.key ? "active" : ""}" type="button" data-group="${group.key}">
          ${group.label}
          <span>${group.count} tasks</span>
        </button>
      `).join("");

      tabs.querySelectorAll(".tab").forEach((button) => {
        button.addEventListener("click", () => {
          state.group = button.dataset.group;
          state.category = "all";
          render();
        });
      });
    }

    function renderCategories() {
      const categories = [...new Set(baseFilteredTasks().map((task) => task.category).filter(Boolean))].sort();
      categorySelect.innerHTML = [
        `<option value="all">All categories</option>`,
        ...categories.map((category) => `<option value="${escapeHtml(category)}">${escapeHtml(category)}</option>`),
      ].join("");
      categorySelect.value = categories.includes(state.category) ? state.category : "all";
    }

    function renderDataSummary(tasks) {
      const apolloAuc = mean(tasks.map((task) => metricValue(task, "Apollo", "auc")));
      const baselineAuc = mean(tasks.map((task) => metricValue(task, "Age-Sex", "auc")));
      const deltaAuc = apolloAuc == null || baselineAuc == null ? null : apolloAuc - baselineAuc;
      const totalRowsN = tasks.reduce((sum, task) => sum + (task.nValue || 0), 0);

      dataSummary.innerHTML = [
        [`${tasks.length}`, "visible tasks"],
        [formatNumber(totalRowsN), "sum of task N"],
        [apolloAuc == null ? "NA" : apolloAuc.toFixed(3), "mean Apollo AUC"],
        [deltaAuc == null ? "NA" : formatDelta(deltaAuc), "mean AUC delta"],
      ].map(([value, label]) => `
        <div class="metric-chip">
          <strong>${value}</strong>
          <span>${label}</span>
        </div>
      `).join("");
    }

    function renderRows(tasks) {
      const metricKey = state.metric;
      taskRows.innerHTML = tasks.map((task) => {
        const delta = deltaValue(task, metricKey);
        const apollo = metricValue(task, "Apollo", metricKey);
        const good = isGoodDelta(delta, metricKey);
        const badge = task.isCancerBenchmark ? `<span class="pill gold">Cancer benchmark</span>` : `<span class="pill">${task.group}</span>`;

        return `
          <tr data-id="${task.id}" class="${state.selectedId === task.id ? "selected" : ""}">
            <td>
              <div class="task-name">${escapeHtml(task.task)}</div>
              <span class="subtle">${badge}</span>
            </td>
            <td>${escapeHtml(task.category)}<span class="subtle">${escapeHtml(task.group)}</span></td>
            <td class="perf">${escapeHtml(task.duration)}</td>
            <td class="perf">${escapeHtml(task.n)}</td>
            <td class="perf">${escapeHtml(task.incidence)}</td>
            <td class="perf">${escapeHtml(metricDisplay(task, "Age-Sex", metricKey))}</td>
            <td class="perf bar-cell">
              ${escapeHtml(metricDisplay(task, "Apollo", metricKey))}
              <div class="bar"><span style="width: ${scoreWidth(apollo)}%"></span></div>
            </td>
            <td class="delta ${good ? "good" : "bad"}">${formatDelta(delta)}</td>
          </tr>
        `;
      }).join("");

      taskRows.querySelectorAll("tr").forEach((row) => {
        row.addEventListener("click", () => {
          state.selectedId = Number(row.dataset.id);
          renderDetails(TASKS[state.selectedId]);
          taskRows.querySelectorAll("tr").forEach((item) => item.classList.toggle("selected", item === row));
        });
      });

      emptyState.hidden = tasks.length > 0;
    }

    function renderDetails(task) {
      if (!task) {
        detailsPane.innerHTML = `<div class="empty">No task selected.</div>`;
        return;
      }

      const eventRows = [
        ["Duration", task.duration],
        ["Patients", task.n],
        ["Incidence", task.incidence],
        ["Sex filter", task.sex],
        ["Snapshot", task.snapshotEvent],
        ["Endpoint", task.endpointEvent],
      ].filter(([, value]) => value && value !== "-");

      const performanceRows = Object.entries(METRICS).map(([key, meta]) => {
        const delta = deltaValue(task, key);
        const good = isGoodDelta(delta, key);
        return `
          <tr>
            <td>${meta.label}</td>
            <td>${escapeHtml(metricDisplay(task, "Age-Sex", key))}</td>
            <td>${escapeHtml(metricDisplay(task, "Apollo", key))}</td>
            <td class="${good ? "delta good" : "delta bad"}">${formatDelta(delta)}</td>
          </tr>
        `;
      }).join("");

      detailsPane.innerHTML = `
        <div class="details-head">
          ${task.isCancerBenchmark ? `<span class="pill gold">Cancer benchmark</span>` : `<span class="pill">${escapeHtml(task.group)}</span>`}
          <h2>${escapeHtml(task.task)}</h2>
          <span class="subtle">${escapeHtml(task.category)}</span>
        </div>
        <div class="details-body">
          <dl class="kv">
            ${eventRows.map(([label, value]) => `<dt>${label}</dt><dd>${escapeHtml(value)}</dd>`).join("")}
          </dl>
          <table class="details-table">
            <thead>
              <tr>
                <th>Metric</th>
                <th>Baseline</th>
                <th>Apollo</th>
                <th>Delta</th>
              </tr>
            </thead>
            <tbody>${performanceRows}</tbody>
          </table>
        </div>
      `;
    }

    function renderBenchmarkNote() {
      const visible = state.group === "cancer_benchmark";
      benchmarkNote.classList.toggle("visible", visible);
      benchmarkNote.textContent = visible
        ? `${DATA.cancerBenchmarkNote} Showing ${DATA.cancerBenchmarkCount} figure-listed tasks from the current draft.`
        : "";
    }

    function exportCsv(tasks) {
      const metricKey = state.metric;
      const headers = [
        "group",
        "category",
        "task",
        "duration",
        "n",
        "incidence",
        "baseline",
        "apollo",
        "delta",
        "snapshot_event",
        "endpoint_event",
      ];
      const rows = tasks.map((task) => [
        task.group,
        task.category,
        task.task,
        task.duration,
        task.n,
        task.incidence,
        metricDisplay(task, "Age-Sex", metricKey),
        metricDisplay(task, "Apollo", metricKey),
        formatDelta(deltaValue(task, metricKey)),
        task.snapshotEvent || "",
        task.endpointEvent || "",
      ]);
      const csv = [headers, ...rows]
        .map((row) => row.map((value) => `"${String(value).replace(/"/g, '""')}"`).join(","))
        .join("\n");
      const blob = new Blob([csv], { type: "text/csv" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `apollo-task-explorer-${metricKey}.csv`;
      link.click();
      URL.revokeObjectURL(url);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function render() {
      renderTabs();
      renderCategories();
      renderBenchmarkNote();
      const tasks = filteredTasks();
      if (!tasks.some((task) => task.id === state.selectedId)) {
        state.selectedId = tasks[0]?.id ?? null;
      }
      renderDataSummary(tasks);
      renderRows(tasks);
      renderDetails(TASKS[state.selectedId]);
    }

    searchInput.addEventListener("input", () => {
      state.search = searchInput.value;
      render();
    });

    categorySelect.addEventListener("change", () => {
      state.category = categorySelect.value;
      render();
    });

    metricSelect.addEventListener("change", () => {
      state.metric = metricSelect.value;
      render();
    });

    sortSelect.addEventListener("change", () => {
      state.sort = sortSelect.value;
      render();
    });

    exportButton.addEventListener("click", () => exportCsv(filteredTasks()));

    renderSummaryTiles();
    render();
  </script>
</body>
</html>
